name: Build Wheels
on:
  push:
    branches: [ main ]
  pull_request:
  release:
    types: [ published ]

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-15, macos-15-intel, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Enable long paths on Windows
        if: matrix.os == 'windows-latest'
        run: |
          New-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem" -Name "LongPathsEnabled" -Value 1 -PropertyType DWORD -Force
        shell: pwsh

      - name: Install rdkit via conda (Windows)
        if: matrix.os == 'windows-latest'
        shell: cmd
        run: C:\Miniconda\Scripts\conda.exe install -c conda-forge rdkit -y --quiet

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.3
        with:
          package-dir: py
        env:
          CIBW_MANYLINUX_X86_64_IMAGE: manylinux_2_28
          CIBW_BUILD: "cp39-* cp310-* cp311-* cp312-* cp313-* cp314-*"
          CIBW_SKIP: "*-win32 *-manylinux_i686 *-musllinux_*"

          # Linux: build Boost from source (system has 1.66, RDKit needs 1.70+), then build RDKit
          CIBW_BEFORE_ALL_LINUX: |
            set -ex
            dnf install -y epel-release
            dnf install -y clang llvm-devel cmake eigen3-devel python3-devel sqlite-devel git wget

            # Boost 1.82 from source
            wget -q https://boostorg.jfrog.io/artifactory/main/release/1.82.0/source/boost_1_82_0.tar.gz -O /tmp/boost.tar.gz
            tar xf /tmp/boost.tar.gz -C /tmp
            cd /tmp/boost_1_82_0
            ./bootstrap.sh --prefix=/usr/local
            ./b2 install --prefix=/usr/local -j$(nproc) link=shared \
              --with-serialization --with-regex --with-iostreams \
              --with-system --with-filesystem --with-thread \
              --with-date_time --with-random

            # RDKit from source
            git clone --depth 1 --branch Release_2024_09_6 https://github.com/rdkit/rdkit.git /tmp/rdkit
            cmake -S /tmp/rdkit -B /tmp/rdkit/build \
              -DRDK_BUILD_PYTHON_WRAPPERS=OFF \
              -DRDK_BUILD_TESTS=OFF \
              -DCMAKE_INSTALL_PREFIX=/usr/local \
              -DCMAKE_BUILD_TYPE=Release \
              -DBOOST_ROOT=/usr/local
            cmake --build /tmp/rdkit/build -j$(nproc)
            cmake --install /tmp/rdkit/build

            curl https://sh.rustup.rs -sSf | sh -s -- --default-toolchain stable -y

          # macOS: install llvm (for libclang), rdkit, and rust
          CIBW_BEFORE_ALL_MACOS: >
            brew install llvm rdkit &&
            curl https://sh.rustup.rs -sSf | sh -s -- --default-toolchain stable -y

          # Windows: rdkit installed via conda in a separate step above
          CIBW_BEFORE_ALL_WINDOWS: "choco install llvm -y && rustup default stable"

          # Environment variables
          CIBW_ENVIRONMENT_LINUX: "PATH=$HOME/.cargo/bin:$PATH RDBASE=/usr/local LD_LIBRARY_PATH=/usr/local/lib:$LD_LIBRARY_PATH"
          CIBW_ENVIRONMENT_MACOS: "PATH=$HOME/.cargo/bin:$PATH LIBCLANG_PATH=$(brew --prefix llvm)/lib MACOSX_DEPLOYMENT_TARGET=15.0"
          CIBW_ENVIRONMENT_WINDOWS: 'LIBCLANG_PATH="C:\\Program Files\\LLVM\\bin" PATH="C:\\Program Files\\LLVM\\bin;C:\\Miniconda\\Library\\bin;$PATH" RDBASE="C:\\Miniconda\\Library"'

          # Tests
          CIBW_TEST_REQUIRES: "pytest rdkit"
          CIBW_TEST_COMMAND: "pytest {project}/pytests -v"

          CIBW_BUILD_VERBOSITY: 3

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build sdist
        run: pipx run build --sdist
        working-directory: py

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: py/dist/*.tar.gz

  upload_pypi:
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    # Only upload to PyPI on release
    if: github.event_name == 'release' && github.event.action == 'published'
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: "*"
          path: dist
          merge-multiple: true

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
